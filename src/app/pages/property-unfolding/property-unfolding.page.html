<ion-content>
  <div class="main_content_div">

    <app-page-header (back)="goBack()">
      <ion-label class="head_lbl">{{ gameConfig.name }}</ion-label>
      <ion-label class="sub_lbl">Desdobramento — escolha a quantidade de cartões</ion-label>

      <ion-list>
        <ion-item>
          <ion-select placeholder="Selecione" #qtdCard>
            <ion-select-option value="1">1 cartão</ion-select-option>
            <ion-select-option value="5">5 cartões</ion-select-option>
            <ion-select-option value="10">10 cartões</ion-select-option>
            <ion-select-option value="15">15 cartões</ion-select-option>
            <ion-select-option value="20">20 cartões</ion-select-option>
            <ion-select-option value="30">30 cartões</ion-select-option>
          </ion-select>
        </ion-item>
      </ion-list>

      <div class="btn_div">
        <ion-button class="dp-pill-btn" (click)="onSave(qtdCard)" expand="block">
          Gerar
        </ion-button>
      </div>
      <p>&nbsp;</p>
    </app-page-header>

  </div>
</ion-content>

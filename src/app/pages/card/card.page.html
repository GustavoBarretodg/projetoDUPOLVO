<ion-content>
  <div class="main_content_div">

    <div class="back_image">
      <img src="assets/imgs/dupolvo-logo.png">
    </div>

    <div class="blue_div">
      <ion-label class="head_lbl">Carrinho de apostas</ion-label>
      <p class="subtitle_lbl">Apostas aguardando pagamento</p>

      <div *ngIf="cards.length === 0" class="empty_msg">
        <ion-icon name="cart-outline" class="empty_icon"></ion-icon>
        <ion-label>Nenhuma aposta no carrinho.</ion-label>
        <p>Vá para a aba Apostar para escolher seus jogos!</p>
      </div>

      <div class="card_item" *ngFor="let card of cards">

        <div class="card_header" [style.borderLeftColor]="getGameColor(card.gameType)">
          <span class="game_name" [style.color]="getGameColor(card.gameType)">{{ getGameName(card.gameType) }}</span>
          <span class="card_price">{{ getCardPrice(card) }}</span>
        </div>

        <div class="numbers_row">
          <span class="number_bubble"
                *ngFor="let n of card.bet"
                [style.background]="getGameColor(card.gameType)">{{ n }}</span>
        </div>

        <div class="card_footer">
          <ion-badge color="warning">Aguardando pagamento</ion-badge>
          <ion-button fill="clear" color="danger" size="small" (click)="removeCard(card.id)">
            <ion-icon name="trash-outline" slot="start"></ion-icon>
            Remover
          </ion-button>
        </div>

      </div>

      <div class="total_bar" *ngIf="cards.length > 0">
        <span class="total_label">Total do carrinho</span>
        <span class="total_value">{{ totalValue }}</span>
      </div>

    </div>
  </div>
</ion-content>

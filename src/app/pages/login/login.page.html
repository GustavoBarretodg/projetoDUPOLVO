<ion-content>
  <div class="main_content_div">

    <!-- Tela de boas-vindas -->
    <div class="welcome_screen" *ngIf="!showForm">

      <div class="logo_area">
        <img src="assets/imgs/dupolvo-logo.png" class="logo_img">
      </div>

      <div class="text_area">
        <h1 class="tagline">Aposte com segurança e praticidade</h1>
        <p class="description">Faça suas apostas de forma simples e acompanhe os resultados em tempo real.</p>
      </div>

      <div class="actions_area">
        <ion-button expand="block" class="btn_primary" (click)="showForm = true">
          Entrar
        </ion-button>
        <ion-button expand="block" fill="outline" class="btn_outline" (click)="goToRegister()">
          Criar conta
        </ion-button>
      </div>

    </div>

    <!-- Formulário de login -->
    <div class="login_screen" *ngIf="showForm">

      <div class="back_image">
        <img src="assets/imgs/dupolvo-logo.png">
      </div>

      <div class="blue_div">

        <ion-label class="head_lbl">Entre com a sua conta</ion-label>

        <ion-input type="text" placeholder="E-mail" #email></ion-input>
        <ion-input type="password" placeholder="Senha" #password></ion-input>

        <div class="btn_div">
          <ion-button (click)="onLogin(email, password)" expand="block">
            Entrar
          </ion-button>
        </div>

        <ion-label class="head_lbl_bottom" (click)="goToRegister()">Ainda não possui cadastro, clique aqui</ion-label>
        <ion-label class="back_lbl" (click)="showForm = false">← Voltar</ion-label>

      </div>
    </div>

  </div>
</ion-content>
